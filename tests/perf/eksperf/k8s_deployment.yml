apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hsperf-test
  name: hsperf-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hsperf-test
  template:
    metadata:
      labels:
        app: hsperf-test
    spec:
      containers:
        -
          name: perf
          image: 891377354611.dkr.ecr.us-east-1.amazonaws.com/hsperftest:v19
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128M"
            limits:
              memory: "512M"
          env:
          - name: HS_ENDPOINT
            value: "http://hsds.hsds.svc.cluster.local"
          - name: HS_USERNAME
            valueFrom:
              secretKeyRef:
                name: hsclient-keys
                key: hs_username
          - name: HS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: hsclient-keys
                key: hs_password
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_secret_access_key
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
        -
          name: head
          image: 891377354611.dkr.ecr.us-east-1.amazonaws.com/hsds:v01
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128M"
            limits:
              memory: "256M"
          volumeMounts:
          - name: accounts
            mountPath: "/config/passwd.txt"
            subPath: passwd.txt
          - name: hsds-config
            mountPath: "/config/config.yml"
            subPath: config.yml
          - name: hsds-override
            mountPath: "/config/override.yml"
            subPath: override.yml
          ports:
            -
              containerPort: 5100
          env:
          - name: NODE_TYPE
            value: head_node
          - name: TARGET_SN_COUNT
            value: "1"
          - name: TARGET_DN_COUNT
            value: "1"
          - name: K8S_APP_LABEL
            value: hsperf-test
          - name: PASSWORD_FILE
            value: /config/passwd.txt
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_secret_access_key
        -
          name: sn
          image: 891377354611.dkr.ecr.us-east-1.amazonaws.com/hsds:v01
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256M"
            limits:
              memory: "1024M"
          volumeMounts:
          - name: accounts
            mountPath: "/config/passwd.txt"
            subPath: passwd.txt
          - name: hsds-config
            mountPath: "/config/config.yml"
            subPath: config.yml
          - name: hsds-override
            mountPath: "/config/override.yml"
            subPath: override.yml
          ports:
            -
              containerPort: 5101
          env:
          - name: NODE_TYPE
            value: sn
          - name: HEAD_ENDPOINT
            value: http://localhost:5100
          - name: K8S_APP_LABEL
            value: hsperf-test
          - name: PASSWORD_FILE
            value: /config/passwd.txt
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_secret_access_key
        -
          name: dn
          image: 891377354611.dkr.ecr.us-east-1.amazonaws.com/hsds:v01
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "256M"
            limits:
              memory: "512M"
          volumeMounts:
          - name: accounts
            mountPath: "/config/passwd.txt"
            subPath: passwd.txt
          - name: hsds-config
            mountPath: "/config/config.yml"
            subPath: config.yml
          - name: hsds-override
            mountPath: "/config/override.yml"
            subPath: override.yml
          ports:
            -
              containerPort: 6101
          env:
          - name: NODE_TYPE
            value: dn
          - name: HEAD_ENDPOINT
            value: http://localhost:5100
          - name: K8S_APP_LABEL
            value: hsperf-test
          - name: METADATA_MEM_CACHE_SIZE
            value: 64m
          - name: CHUNK_MEM_CACHE_SIZE
            value: 64m
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_access_key_id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-auth-keys
                key: aws_secret_access_key
      volumes:
        - name: accounts
          secret:
            secretName: user-password
        - name: hsds-config
          configMap:
            name: hsds-config
        - name: hsds-override
          configMap:
            name: hsds-override

      
